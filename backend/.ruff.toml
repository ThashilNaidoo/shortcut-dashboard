# https://docs.astral.sh/ruff/settings

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Make sure it lines up with setting.json: "editor.rulers": [100]
line-length = 120
indent-width = 4

# Assume Python 3.11
target-version = "py312"

[lint]
# A list of rule codes or prefixes to enable. Prefixes can specify exact rules (like F841),
# entire categories (like F), or anything in between.
# When breaking ties between enabled and disabled rules (via select and ignore, respectively),
# more specific prefixes override less specific prefixes. ignore takes precedence over select
# if the same prefix appears in both.
select = [
    "B",   # flake8-bugbear - https://docs.astral.sh/ruff/rules/#flake8-bugbear-b
    "C4",  # flake8-comprehensions - https://docs.astral.sh/ruff/rules/#flake8-comprehensions-c4
    "E",   # pycodestyle errors - https://docs.astral.sh/ruff/rules/#error-e
    "F",   # pyflakes rules - https://docs.astral.sh/ruff/rules/#pyflakes-f
    "W",   # pycodestyle warnings - https://docs.astral.sh/ruff/rules/#warning-w
    "I",   # isort - https://docs.astral.sh/ruff/rules/#isort-i
    "UP",  # pyupgrade - https://docs.astral.sh/ruff/rules/#pyupgrade-up
    "SLF", # self - https://docs.astral.sh/ruff/settings/#lintflake8-self
    "DTZ", # flake8-datetimez - https://docs.astral.sh/ruff/rules/#flake8-datetimez-dtz
    "FIX", # flake8-fixme - https://docs.astral.sh/ruff/rules/#flake8-fixme-fix
    "C4",  # flake8-comprehension - https://docs.astral.sh/ruff/rules/#flake8-commas-com
]

# A list of rule codes or prefixes to ignore. Prefixes can specify exact rules (like F841),
# entire categories (like F), or anything in between.
# When breaking ties between enabled and disabled rules (via select and ignore, respectively)
# more specific prefixes override less specific prefixes. ignore takes precedence over select
# if the same prefix appears in both.
ignore = ["UP037", "B008"]

# Allow fix for all enabled rules (when `--fix`) is provided.
# A list of rule codes or prefixes to consider fixable. By default, all rules are considered fixable.
fixable = ["ALL"]

# A list of rule codes or prefixes to consider non-fixable.
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "lf"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"